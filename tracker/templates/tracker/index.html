{% extends 'tracker/base.html' %}

{% block content %}
<div class="welcome-card">
    <h1>💚 Personal Health Tracker</h1>
    <p>Track your daily health metrics like weight, sleep, blood pressure, and sugar levels to maintain a healthier lifestyle.</p>
    {% if not user.is_authenticated %}
        <div style="margin-top: 30px;">
            <a href="{% url 'login' %}" style="display: inline-block; margin: 10px; padding: 12px 24px; background: #0066cc; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Get Started - Login</a>
            <a href=" {% url 'register' %}" style="display: inline-block; margin: 10px; padding: 12px 24px; background: #00cc99; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Create Account</a>
        </div>
    {% endif %}
</div>
{% endblock %}

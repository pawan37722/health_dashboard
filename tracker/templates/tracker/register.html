{% extends 'tracker/base.html' %}

{% block content %}
<div class="container-box" style="max-width: 450px;">
    <h2>✍️ Create Your Account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p style="text-align: center; margin-top: 20px; color: #666;">
        Already have an account? <a href="{% url 'login' %}" style="color: #0066cc; font-weight: 600; text-decoration: none;">Login here</a>
    </p>
</div>
{% endblock %}

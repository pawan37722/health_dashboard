{% extends 'tracker/base.html' %}

{% block content %}
<div class="container-box" style="max-width: 450px;">
    <h2>🔐 Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p style="text-align: center; margin-top: 20px; color: #666;">
        Don't have an account? <a href="{% url 'register' %}" style="color: #0066cc; font-weight: 600; text-decoration: none;">Register here</a>
    </p>
</div>
{% endblock %}
